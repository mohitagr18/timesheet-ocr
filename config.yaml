extraction_mode: "vlm_full_page"   # 'ppocr_grid' (standard forms) or 'vlm_full_page' (complex matrix forms)

# --- Input / Output ---
paths:
  input_dir: "input"
  output_dir: "output"
  samples_dir: "samples"

# --- OCR confidence thresholds ---
confidence:
  accept_threshold: 0.90
  fallback_threshold: 0.75

# --- PP-OCRv5 settings ---
ppocr:
  lang: "en"
  use_angle_cls: false       # SET TO FALSE: Forces horizontal line reading
  use_gpu: false
  det_db_thresh: 0.45
  rec_batch_num: 4

# --- Qwen2.5-VL via Ollama ---
ollama:
  host: "http://localhost:11434"
  model: "qwen2.5vl:7b"
  timeout_seconds: 60
  max_retries: 2

# --- Image preprocessing ---
preprocessing:
  target_dpi: 400
  denoise: true
  deskew: false
  binarize: false
  adaptive_block_size: 15
  adaptive_c: 3

# --- Layout detection rules ---
layout:
  transposed: true
  
  header_zone: [0.0, 0.0, 1.0, 0.16]
  table_zone: [0.24, 0.16, 1.0, 0.95]  # X-start=24% skips label column; Y covers TIME IN (88%) + HOURS (93%)
  footer_zone: [0.0, 0.95, 1.0, 1.0]

  # MEASURED from debug_layout.py on C.Ferguson & K.Drewry PDFs
  columns:
    date: [0.18, 0.21]        # Y=19.5-19.8% — "DATE (Month/Day/Year)" row
    time_in: [0.865, 0.895]   # Y=87.6-88.1% — "TIME IN" row
    time_out: [0.895, 0.915]  # Y=89.8-90.3% — "TIME OUT" row
    total_hours: [0.915, 0.94]# Y=92.0-92.3% — "NUMBER OF HOURS" row
    notes: [0.94, 1.0]        # Below hours row

# --- Validation rules ---
validation:
  max_shift_hours: 16
  hours_mismatch_tolerance: 0.25
  allow_future_dates: false
  max_days_in_past: 365

# --- Export settings ---
export:
  formats: ["xlsx"]
  excel_sheet_name: "Timesheet Data"