extraction_mode: "ppocr_grid"

# --- Input / Output ---
paths:
  input_dir: "input"
  output_dir: "output"
  samples_dir: "samples"

# --- OCR confidence thresholds ---
confidence:
  accept_threshold: 0.90     # Raised to ensure messy fields aren't accepted blindly
  fallback_threshold: 0.75   # Send anything below 75% to Qwen2.5-VL for a second look

# --- PP-OCRv5 settings ---
ppocr:
  lang: "en"
  use_angle_cls: true
  use_gpu: false
  det_db_thresh: 0.45        # Slightly higher to ignore faint background noise
  rec_batch_num: 4

# --- Qwen2.5-VL via Ollama ---
ollama:
  host: "http://localhost:11434"
  model: "qwen2.5-vl:7b"
  timeout_seconds: 60
  max_retries: 2

# --- Image preprocessing ---
preprocessing:
  target_dpi: 400            # Higher DPI helps read the small handwriting
  denoise: true
  deskew: false              # Disabled to prevent layout coordinate drift
  binarize: false            # Let PaddleOCR handle the raw grayscale/color
  adaptive_block_size: 15
  adaptive_c: 3

# --- Layout detection rules ---
layout:
  transposed: true
  
  # Zoned fractions tailored exactly to the C.Ferguson-style timesheet
  header_zone: [0.0, 0.0, 1.0, 0.14]   # Top block for names
  table_zone: [0.0, 0.14, 1.0, 0.72]   # The main data section
  footer_zone: [0.0, 0.92, 1.0, 1.0]   # Signatures at the very bottom

  # Y-axis bands down the page (for transposed=true)
  columns:
    date: [0.17, 0.23]        # Captures the "1/7/26" row
    time_in: [0.54, 0.59]     # Skips the medical checklist, targets "TIME IN" 
    time_out: [0.59, 0.64]    # Targets "TIME OUT"
    total_hours: [0.64, 0.69] # Targets "NUMBER OF HOURS"
    notes: [0.70, 0.92]       # Captures the large comments block

# --- Validation rules ---
validation:
  max_shift_hours: 16
  hours_mismatch_tolerance: 0.25
  allow_future_dates: false
  max_days_in_past: 365

# --- Export settings ---
export:
  formats: ["xlsx"]
  excel_sheet_name: "Timesheet Data"



