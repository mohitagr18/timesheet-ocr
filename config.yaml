extraction_mode: vlm_full_page
paths:
  input_dir: input
  output_dir: output
  samples_dir: samples
confidence:
  accept_threshold: 0.9
  fallback_threshold: 0.75
ppocr:
  lang: en
  use_textline_orientation: false
  device: cpu
  text_det_thresh: 0.45
  text_rec_batch_size: 4
ollama:
  host: http://localhost:11434
  model: qwen2.5vl:7b
  timeout_seconds: 60
  max_retries: 2
preprocessing:
  target_dpi: 400
  denoise: true
  deskew: false
  binarize: false
  adaptive_block_size: 15
  adaptive_c: 3
layout:
  transposed: true
  header_zone:
  - 0.0
  - 0.0
  - 1.0
  - 0.16
  table_zone:
  - 0.24
  - 0.16
  - 1.0
  - 0.98
  footer_zone:
  - 0.0
  - 0.98
  - 1.0
  - 1.0
validation:
  max_shift_hours: 16
  hours_mismatch_tolerance: 0.25
  allow_future_dates: false
  max_days_in_past: 365
  week_start_day: 2
  week_length: 7
export:
  formats:
  - xlsx
  excel_sheet_name: Timesheet Data
  include_review_json: true
  include_report_json: true
debug:
  visualize_ocr: false
  output_dir: output/debug
  anonymize_phi: true
  signature_zone: 0.3
  signature_ocr_threshold: 100
cloud_vlm:
  provider: google
  api_key_env: GOOGLE_API_KEY
  model: gemini-3-flash-preview
  timeout_seconds: 30
